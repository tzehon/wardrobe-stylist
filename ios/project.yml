name: Wardrobe
options:
  bundleIdPrefix: com.tth
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
targets:
  Wardrobe:
    type: application
    platform: iOS
    sources:
      - path: Wardrobe
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tth.Wardrobe
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Wardrobe/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
  WardrobeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WardrobeTests
    dependencies:
      - target: Wardrobe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tth.WardrobeTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Wardrobe:
    build:
      targets:
        Wardrobe: all
    test:
      targets:
        - WardrobeTests
